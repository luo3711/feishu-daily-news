name: Fuel Cell Intelligence Daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  push-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search & Push Fuel Cell Report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python push_news.py